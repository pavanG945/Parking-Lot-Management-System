<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Theeta Parking</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        min-height: 100vh;
        background: radial-gradient(circle at top left, #1f2933, #111827);
        color: #f9fafb;
      }
      .navbar {
        background: rgba(15, 23, 42, 0.95) !important;
        backdrop-filter: blur(10px);
      }
      .card {
        border-radius: 1rem;
      }
      .card-title {
        font-weight: 600;
      }
      .btn-primary {
        background: linear-gradient(90deg, #2563eb, #7c3aed);
        border: none;
      }
      .btn-primary:hover {
        background: linear-gradient(90deg, #1d4ed8, #6d28d9);
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
      <div class="container">
        <a class="navbar-brand fw-semibold" href="/">Theeta Parking</a>
        <div class="d-flex flex-wrap gap-2">
          <a class="btn btn-outline-light btn-sm" href="/setup">Layout</a>
          <a class="btn btn-outline-light btn-sm" href="/floors">Floor View</a>
          <a class="btn btn-outline-light btn-sm" href="/search">Search</a>
          <a class="btn btn-outline-light btn-sm" href="/dashboard">Dashboard</a>
          <a class="btn btn-outline-light btn-sm" href="/park">Park</a>
          <a class="btn btn-outline-light btn-sm" href="/exit">Exit</a>
        </div>
      </div>
    </nav>

    <main class="container pb-4">
      {% block content %}{% endblock %}
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
