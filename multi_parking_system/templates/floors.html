{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center mb-4">
  <div class="col-lg-10">
    <div class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center mb-3">
      <div>
        <h1 class="mb-1">Floor View</h1>
        <p class="text-muted mb-0">
          Visual map of each floor showing free and occupied slots.
        </p>
      </div>
    </div>

    {% for floor in floors %}
    <div class="card shadow-sm border-0 mb-3">
      <div class="card-body">
        <h5 class="card-title mb-3">Floor {{ floor.floor_no }}</h5>
        <div class="d-flex flex-wrap gap-2">
          {% for slot in floor.slots %}
          <div
            class="badge rounded-pill px-3 py-2 {% if slot.is_free %}bg-success{% else %}bg-danger{% endif %}"
            title="{% if slot.is_free %}Free{% else %}Occupied by {{ slot.vehicle.number }}{% endif %}"
          >
            {{ slot.slot_id }}
          </div>
          {% endfor %}
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
